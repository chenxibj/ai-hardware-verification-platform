server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: ai-hardware-verification-platform
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ahvp}
    username: ${DB_USER:ahvp}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 600000
      leak-detection-threshold: 60000
      pool-name: ahvp-hikari-pool
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  task:
    scheduling:
      pool:
        size: 4

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  # 文件上传配置 (#172)
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

# MinIO 配置
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}

# JWT 配置
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}
  header: ${JWT_HEADER:Authorization}
  prefix: ${JWT_PREFIX:Bearer }

# 日志配置
logging:
  level:
    root: INFO
    com.lab: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 管理端点
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Agent 通信 Token
agent:
  token: ${AGENT_TOKEN:ahvp-agent-secret-2026}

# 版本信息 (#460)
app:
  version: ${APP_VERSION:unknown}
  git-commit: ${GIT_COMMIT:unknown}
  build-time: ${BUILD_TIME:unknown}

# #523: Deprecated endpoint feature flags
ahvp:
  deprecated:
    complete-endpoint:
      return-gone: false  # Set to true to return 410 Gone for POST /tasks/{id}/complete
