version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: ahvp-postgres
    command: postgres -c max_connections=1000 -c shared_buffers=256MB
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./deploy/data/postgres:/var/lib/postgresql/data
      - ./deploy/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ahvp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ahvp-network
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ahvp-redis
    command: redis-server --appendonly yes
    volumes:
      - ./deploy/data/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ahvp-network
    restart: unless-stopped

  # MinIO 对象存储
  minio:
    image: minio/minio:RELEASE.2024-01-01T16-36-33Z
    container_name: ahvp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./deploy/data/minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - ahvp-network
    restart: unless-stopped

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        APP_VERSION: ${APP_VERSION:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: ahvp-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_FLYWAY_VALIDATE_ON_MIGRATE: "false"
      SPRING_FLYWAY_CLEAN_DISABLED: "true"
      # Version info (runtime override for CI and deploys)
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
      APP_VERSION: ${APP_VERSION:-unknown}
      BUILD_TIME: ${BUILD_TIME:-unknown}
      # #318: Reduce Hibernate SQL noise, surface useful exceptions
      LOGGING_LEVEL_ORG_HIBERNATE_SQL: WARN
      LOGGING_LEVEL_ORG_HIBERNATE_TYPE_DESCRIPTOR_SQL_BASICBINDER: WARN
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: INFO
      LOGGING_LEVEL_COM_AHVP: DEBUG
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      AGENT_TOKEN: ${AGENT_TOKEN}
    volumes:
      - /data/assets:/data/assets
      - ./eval-scripts:/app/eval-scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - ahvp-network
    restart: unless-stopped

  # Python 评测引擎
  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    container_name: ahvp-engine
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
    depends_on:
      - backend
    networks:
      - ahvp-network
    restart: unless-stopped

  # 前端服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        APP_VERSION: ${APP_VERSION:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    container_name: ahvp-frontend
    ports:
      - "80:80"
      # #513: Removed 443 mapping - no SSL cert in dev; open 443 caused Chrome HTTPS-First
      # to connect, get TLS error, and not fall back to HTTP properly
      # - "443:443"
    depends_on:
      - backend
    networks:
      - ahvp-network
    restart: unless-stopped

networks:
  ahvp-network:
    driver: bridge
