<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- 外层六边形 - 代表芯片 -->
  <path d="M16 2L28 9V23L16 30L4 23V9L16 2Z" stroke="url(#grad1)" stroke-width="1.5" fill="none"/>
  <!-- 内层电路节点 -->
  <circle cx="16" cy="10" r="2" fill="url(#grad2)"/>
  <circle cx="10" cy="19" r="2" fill="url(#grad2)"/>
  <circle cx="22" cy="19" r="2" fill="url(#grad2)"/>
  <!-- 连接线 - 电路感 -->
  <line x1="16" y1="12" x2="16" y2="16" stroke="url(#grad2)" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="11.5" y2="18" stroke="url(#grad2)" stroke-width="1.2"/>
  <line x1="16" y1="16" x2="20.5" y2="18" stroke="url(#grad2)" stroke-width="1.2"/>
  <!-- 中心 AI 核心 -->
  <circle cx="16" cy="16" r="2.5" fill="url(#grad3)"/>
  <circle cx="16" cy="16" r="1" fill="white"/>
  <!-- 外围数据流点 -->
  <circle cx="16" cy="4" r="1" fill="#4FC3F7"/>
  <circle cx="26" cy="12" r="1" fill="#4FC3F7"/>
  <circle cx="26" cy="20" r="1" fill="#7C4DFF"/>
  <circle cx="16" cy="28" r="1" fill="#7C4DFF"/>
  <circle cx="6" cy="20" r="1" fill="#00E5FF"/>
  <circle cx="6" cy="12" r="1" fill="#00E5FF"/>
  <!-- 引脚线 - 芯片感 -->
  <line x1="10" y1="5.5" x2="8" y2="4" stroke="#4FC3F7" stroke-width="0.8"/>
  <line x1="22" y1="5.5" x2="24" y2="4" stroke="#4FC3F7" stroke-width="0.8"/>
  <line x1="10" y1="26.5" x2="8" y2="28" stroke="#7C4DFF" stroke-width="0.8"/>
  <line x1="22" y1="26.5" x2="24" y2="28" stroke="#7C4DFF" stroke-width="0.8"/>
  <defs>
    <linearGradient id="grad1" x1="4" y1="2" x2="28" y2="30">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="50%" stop-color="#7C4DFF"/>
      <stop offset="100%" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="grad2" x1="10" y1="10" x2="22" y2="19">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <radialGradient id="grad3" cx="16" cy="16" r="3">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </radialGradient>
