name: Deploy Frontend & Smoke Test

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Deploy to nginx container
        run: |
          docker cp frontend/build/. ahvp-frontend:/usr/share/nginx/html/
          docker exec ahvp-frontend nginx -s reload

      - name: Run smoke tests
        run: |
          chmod +x deploy/smoke-test.sh
          bash deploy/smoke-test.sh
