name: CI Pipeline

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  backend-api-tests:
    name: Backend API Tests
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run API integration tests
        run: |
          cd backend-tests
          chmod +x run-tests.sh
          ./run-tests.sh

      - name: Cleanup test data
        if: always()
        run: bash deploy/cleanup-test-data.sh
